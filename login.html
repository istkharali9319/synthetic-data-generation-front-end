<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Modules Login</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --panel: #ffffff;
      --line: #d9d9e3;
      --ink: #202123;
      --muted: #6e6e80;
      --accent: #10a37f;
      --accent-dark: #0b7a60;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, rgba(16, 163, 127, 0.12), transparent 30%), var(--bg);
      color: var(--ink);
    }

    .card {
      width: min(100%, 430px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.08);
    }

    .badge {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1, p { margin-top: 0; }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 22px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button,
    a {
      font: inherit;
    }

    button {
      flex: 1;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      text-decoration: none;
      background: #fff;
      font-weight: 700;
    }

    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">AI</div>
    <h1>Login Page</h1>
    <p>Use this page as a common sign-in screen before entering the chatbot, sales business brochure, or AI tutor modules.</p>

    <form id="loginForm">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Enter your name" required>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter your email" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter your password" required>
      </div>

      <div class="actions">
        <button type="submit">Login</button>
        <a class="back-link" href="./index.html">Back</a>
      </div>

      <div class="status" id="status">Ready</div>
    </form>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const statusEl = document.getElementById("status");

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!name || !email || !password) {
        statusEl.textContent = "Please fill in all fields.";
        return;
      }

      statusEl.textContent = "Login successful. You can now open any module.";
    });
  </script>
</body>
</html>
